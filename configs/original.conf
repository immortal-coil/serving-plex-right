upstream plex {
    server 127.0.0.1:32400;
}

server {
    listen 443 ssl;
    http2 on;
    server_name plex.geojams.com;

    # TLS
    ssl_certificate /etc/letsencrypt/live/plex.geojams.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plex.geojams.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/plex.geojams.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_ciphers ECDHE+AESGCM:ECDHE+AES256:ECDHE+AES128:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options deny always;
    add_header X-Content-Type-Options nosniff always;

    # Plex UI, API, WebSockets
    location / {
        proxy_pass http://plex;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_ssl_verify off;
    }

    # Media streaming (no buffering, no caching)
    location ~* \.(mp4|mkv|avi|mov|ts|m3u8|mpd|flv)$ {
        proxy_pass http://plex;

        proxy_http_version 1.1;
        proxy_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
