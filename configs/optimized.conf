upstream plex {
    server 127.0.0.1:32400;
    keepalive 16;
}

# LAN HTTP — no TLS, proxy + caching, local subnet only
server {
    listen 80;
    listen [::]:80;
    server_name plex.example.com;

    allow 192.168.0.0/16;
    deny all;

    include include/gzip.conf;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_set_header Accept-Encoding   "";

    proxy_buffering off;

    location /:/websockets/ {
        proxy_pass http://plex;
        proxy_read_timeout 3600s;
    }

    location ~ ^/(library/parts|video)/ {
        proxy_pass http://plex;
        proxy_request_buffering off;
        proxy_read_timeout      7200s;
        proxy_send_timeout      7200s;
        access_log              off;
    }

    location /photo/:/ {
        proxy_pass http://plex;
        proxy_buffering               on;
        proxy_cache                   CACHE;
        proxy_cache_valid             200 1h;
        proxy_cache_use_stale         error timeout updating;
        proxy_cache_background_update on;
        proxy_cache_lock              on;
        proxy_cache_key               "$host$uri$arg_url$arg_width$arg_height";
        proxy_ignore_headers          Cache-Control Expires;
        add_header X-Cache-Status     $upstream_cache_status always;
    }

    location / {
        proxy_pass http://plex;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name plex.example.com;

    ssl_certificate      /etc/letsencrypt/live/plex.example.com/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/plex.example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/plex.example.com/chain.pem;

    include include/ssl.conf;
    include include/gzip.conf;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
    proxy_set_header Accept-Encoding   "";

    proxy_buffering off;

    # 1. WebSocket
    location /:/websockets/ {
        proxy_pass http://plex;
        proxy_read_timeout 3600s;
    }

    # 2. Direct-play streaming
    location ~ ^/(library/parts|video)/ {
        proxy_pass http://plex;
        proxy_request_buffering off;
        proxy_read_timeout      7200s;
        proxy_send_timeout      7200s;
        access_log              off;
    }

    # 3. Thumbnails and posters
    # cache_key includes url/width/height (the image identity) but excludes
    # X-Plex-Token so all devices share the same cache entries for the same image
    location /photo/:/ {
        proxy_pass http://plex;
        proxy_buffering               on;
        proxy_cache                   CACHE;
        proxy_cache_valid             200 1h;
        proxy_cache_use_stale         error timeout updating;
        proxy_cache_background_update on;
        proxy_cache_lock              on;
        proxy_cache_key               "$host$uri$arg_url$arg_width$arg_height";
        proxy_ignore_headers          Cache-Control Expires;
        add_header X-Cache-Status     $upstream_cache_status always;
    }

    # 4. UI / API / metadata
    location / {
        proxy_pass http://plex;
    }
}
